name: Build, Push and Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS Connection
        run: aws sts get-caller-identity

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile Frontend
        run: mvn clean compile

      - name: Generate Static Files
        env:
          BACKEND_USERS_URL: http://54.145.125.41:8081
          BACKEND_PRODUCTS_URL: http://18.234.80.151:8082
        run: mvn exec:java

      - name: Verify Output Directory
        run: ls -la output

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t front-et .

      - name: Tag Docker Image
        run: |
          docker tag front-et:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/front-et:latest

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/front-et:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster evalT-cluster \
            --service front-service \
            --force-new-deployment